<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Signup</title>

  <style>

    body {
      background: #0a0a0f;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #151520;
      padding: 40px;
      border-radius: 12px;
      width: 320px;
    }

    h1 {
      margin-bottom: 25px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 8px;
      background: #222233;
      color: white;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #00f5a0;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    a {
      color: #00f5a0;
      text-decoration: none;
    }

    .bottom {
      margin-top: 15px;
      text-align: center;
    }

  </style>

</head>

<body>

  <div class="box">

    <h1>Create Account</h1>

    <input
      type="text"
      id="username"
      placeholder="Enter Username"
      minlength="3"
      required
    >

    <input
      type="email"
      id="email"
      placeholder="Enter Gmail Address"
      required
    >

    <input
      type="password"
      id="password"
      placeholder="Enter Password"
      minlength="6"
      required
    >

    <button onclick="signup()">Signup</button>

    <div class="bottom">
      Already have account?
      <a href="/login">Login</a>
    </div>

  </div>

  <script>

    async function signup() {

      const username =
        document.getElementById('username').value.trim();

      const email =
        document.getElementById('email').value.trim();

      const password =
        document.getElementById('password').value.trim();

      if (username.length < 3) {
        alert("Username must be at least 3 characters");
        return;
      }

      const gmailPattern =
        /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

      if (!gmailPattern.test(email)) {
        alert("Please enter a valid Gmail address");
        return;
      }

      if (password.length < 6) {
        alert("Password must be at least 6 characters");
        return;
      }

      const response = await fetch('/signup', {

        method: 'POST',

        headers: {
          'Content-Type': 'application/json'
        },

        body: JSON.stringify({
          username,
          email,
          password
        })

      });

      const data = await response.json();

      alert(data.message);

      if (data.success) {
        window.location.href = '/login';
      }

    }

  </script>

</body>

</html>
