<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Signup</title>

  <style>

    body {
      background: #0a0a0f;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #151520;
      padding: 40px;
      border-radius: 12px;
      width: 320px;
    }

    h1 {
      margin-bottom: 25px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 8px;
      background: #222233;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #00f5a0;
      font-weight: bold;
      cursor: pointer;
    }

    a {
      color: #00f5a0;
      text-decoration: none;
    }

    .bottom {
      margin-top: 15px;
      text-align: center;
    }

  </style>

</head>

<body>

  <div class="box">

    <h1>Create Account</h1>

    <input type="text" id="username" placeholder="Username">

    <input type="password" id="password" placeholder="Password">

    <button onclick="signup()">Signup</button>

    <div class="bottom">
      Already have account?
      <a href="/login">Login</a>
    </div>

  </div>

  <script>

    async function signup() {

      const username =
        document.getElementById('username').value;

      const password =
        document.getElementById('password').value;

      const response = await fetch('/signup', {

        method: 'POST',

        headers: {
          'Content-Type': 'application/json'
        },

        body: JSON.stringify({
          username,
          password
        })

      });

      const data = await response.json();

      alert(data.message);

      if (data.success) {
        window.location.href = '/login';
      }

    }

  </script>

</body>

</html>
