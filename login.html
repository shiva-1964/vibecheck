<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>VibeCheck Login</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      background:
        radial-gradient(circle at top,
        #111122,
        #05050a);

      color: white;

      font-family: Arial, sans-serif;

      height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;

      overflow: hidden;
    }

    .box {

      width: 360px;

      background: rgba(20, 20, 35, 0.9);

      border: 1px solid #222233;

      border-radius: 18px;

      padding: 40px;

      backdrop-filter: blur(12px);

      box-shadow:
        0 0 30px rgba(0, 245, 160, 0.1);

    }

    .logo {

      text-align: center;

      font-size: 32px;

      font-weight: bold;

      color: #00f5a0;

      margin-bottom: 10px;
    }

    .sub {

      text-align: center;

      color: #888;

      margin-bottom: 35px;

      font-size: 14px;
    }

    input {

      width: 100%;

      padding: 14px;

      margin-bottom: 18px;

      border: 1px solid #222233;

      border-radius: 10px;

      background: #111118;

      color: white;

      outline: none;

      transition: 0.3s;
    }

    input:focus {

      border-color: #00f5a0;

      box-shadow:
        0 0 12px rgba(0, 245, 160, 0.3);
    }

    button {

      width: 100%;

      padding: 14px;

      border: none;

      border-radius: 10px;

      background: #00f5a0;

      color: black;

      font-weight: bold;

      font-size: 15px;

      cursor: pointer;

      transition: 0.3s;
    }

    button:hover {

      transform: translateY(-2px);

      box-shadow:
        0 0 20px rgba(0, 245, 160, 0.5);
    }

    .bottom {

      text-align: center;

      margin-top: 20px;

      color: #777;
    }

    a {

      color: #00f5a0;

      text-decoration: none;
    }

  </style>

</head>

<body>

  <div class="box">

    <div class="logo">
      ⚡ VibeCheck
    </div>

    <div class="sub">
      Login to continue analyzing internet vibes
    </div>

    <input
      type="text"
      id="username"
      placeholder="Username"
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
    >

    <button onclick="login()">
      Login
    </button>

    <div class="bottom">

      No account?

      <a href="/signup-page">
        Signup
      </a>

    </div>

  </div>

  <script>

    async function login() {

      const username =
        document.getElementById('username').value;

      const password =
        document.getElementById('password').value;

      const response = await fetch('/login', {

        method: 'POST',

        headers: {
          'Content-Type': 'application/json'
        },

        body: JSON.stringify({
          username,
          password
        })

      });

      const data = await response.json();

      alert(data.message);

      if (data.success) {

        window.location.href = '/';

      }

    }

  </script>

</body>

</html>
